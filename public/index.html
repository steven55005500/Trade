<div style="background: #222; padding: 15px; border-radius: 10px; margin-top: 20px; color: white;">
    <h3>Your Referral Link</h3>
    <input type="text" id="refLink" readonly style="width: 80%; padding: 10px; background: #000; color: #0f0; border: 1px solid #444; border-radius: 5px;">
    <button onclick="copyLink()" style="margin-top: 10px; width: 100%; padding: 10px; background: #2ecc71; border: none; color: white; border-radius: 5px; cursor: pointer;">Copy Link</button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    try {
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Isse app full screen khulegi

        const userData = tg.initDataUnsafe.user;
        const botUsername = "tradesomething_bot"; 

        // Thoda wait karke ID check karte hain
        window.onload = () => {
            const linkInput = document.getElementById('refLink');
            if (userData && userData.id) {
                const myRefLink = `https://t.me/${botUsername}?start=${userData.id}`;
                linkInput.value = myRefLink;
            } else {
                linkInput.value = "Open in Telegram to see link";
            }
        };

        function copyLink() {
            const copyText = document.getElementById("refLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            tg.showAlert("Link Copied! Share it with friends.");
        }
    } catch (err) {
        alert("Frontend Error: " + err.message);
    }
</script>
