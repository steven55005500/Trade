<div style="background: #222; padding: 15px; border-radius: 10px; margin-top: 20px;">
    <h3>Your Referral Link</h3>
    <input type="text" id="refLink" readonly style="width: 80%; padding: 5px; background: #000; color: #fff; border: 1px solid #444;">
    <button onclick="copyLink()" style="padding: 5px 10px; background: #2ecc71; border: none; color: white; border-radius: 5px; cursor: pointer;">Copy</button>
</div>

<script>
    // Link generate karna (Bot username replace kar dena)
    const botUsername = "tradesomething_bot"; 
    const myRefLink = `https://t.me/${botUsername}?start=${user.id}`;
    document.getElementById('refLink').value = myRefLink;

    function copyLink() {
        const copyText = document.getElementById("refLink");
        copyText.select();
        document.execCommand("copy");
        alert("Link Copied!");
    }
</script>
